name: Redeploy pipeline

on:
  push:
    branches: ["main"]

jobs:
  webhook-deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Call endpoint
        run: |
          curl -X GET "$ENDPOINT_URL"
        env:
          ENDPOINT_URL: ${{ secrets.ENDPOINT_URL }}
